name: Python CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      TOKENIZERS_PARALLELISM: "false"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify imports
        run: |
          python -c "from services.incident_agent.llm_client import AzureOpenAIClient; print('LLM import OK')"
          python -c "from services.incident_agent.knowledge_base import KnowledgeBase; print('KnowledgeBase import OK')"
         